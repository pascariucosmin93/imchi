name: Build and push Immich images

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      immich_version:
        description: Immich upstream version to wrap
        required: true
        default: v2.7.5

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}
  IMMICH_VERSION: ${{ inputs.immich_version || 'v2.7.5' }}

jobs:
  validate:
    name: Validate manifests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Render prod overlay
        run: kubectl kustomize k8s/overlays/prod

  build:
    name: Build and push
    runs-on: ubuntu-latest
    needs: validate
    strategy:
      matrix:
        include:
          - name: immich-server
            context: docker/immich-server
          - name: immich-machine-learning
            context: docker/immich-machine-learning
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          build-args: |
            IMMICH_VERSION=${{ env.IMMICH_VERSION }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.name }}:main
            ${{ env.IMAGE_PREFIX }}/${{ matrix.name }}:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/${{ matrix.name }}:${{ env.IMMICH_VERSION }}
